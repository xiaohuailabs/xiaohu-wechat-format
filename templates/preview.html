<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - 公众号排版预览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background:
        radial-gradient(circle at top left, rgba(7,193,96,0.08), transparent 24%),
        linear-gradient(180deg, #f4f6f8 0%, #eef2f5 100%);
    min-height: 100vh;
    color: #111827;
}
.toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.86);
    border-bottom: 1px solid rgba(17,24,39,0.08);
}
.toolbar-inner {
    max-width: 980px;
    margin: 0 auto;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}
.toolbar-info {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}
.pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(17,24,39,0.06);
    font-size: 12px;
    font-weight: 700;
    color: #374151;
}
.meta {
    font-size: 13px;
    color: #6b7280;
}
.copy-btn {
    padding: 10px 18px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s ease;
}
.copy-btn:hover {
    background: #06ae56;
    transform: translateY(-1px);
}
.copy-btn.copied {
    background: #34c759;
}
.shell {
    max-width: 980px;
    margin: 0 auto;
    padding: 22px 18px 40px;
}
.control-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
}
.control-card {
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(17,24,39,0.08);
    border-radius: 16px;
    box-shadow: 0 14px 34px rgba(15,23,42,0.08);
    padding: 10px 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}
.fs-label {
    font-size: 12px;
    font-weight: 700;
    color: #6b7280;
}
.fs-btn {
    padding: 6px 12px;
    border: 1px solid rgba(17,24,39,0.12);
    border-radius: 999px;
    background: #fff;
    font-size: 13px;
    font-weight: 700;
    color: #374151;
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: inherit;
}
.fs-btn.active {
    background: rgba(7,193,96,0.12);
    border-color: rgba(7,193,96,0.24);
    color: #067647;
}
.preview-card {
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(17,24,39,0.08);
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 22px 50px rgba(15,23,42,0.1);
}
.preview-head {
    padding: 14px 16px;
    background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(249,250,251,0.9) 100%);
    border-bottom: 1px solid rgba(17,24,39,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.device {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #9ca3af;
    font-size: 12px;
    font-weight: 700;
}
.device-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d1d5db;
}
.article-content {
    padding: 20px;
    font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
#wechatHtml {
    position: absolute;
    left: -9999px;
    top: -9999px;
}
@media (max-width: 640px) {
    .toolbar-inner {
        align-items: flex-start;
        flex-direction: column;
    }
    .copy-btn {
        width: 100%;
    }
    .preview-card {
        border-radius: 18px;
    }
    .article-content {
        padding: 14px;
    }
}
</style>
</head>
<body>

<div class="toolbar">
    <div class="toolbar-inner">
        <div class="toolbar-info">
            <span class="pill">{{THEME_NAME}}</span>
            <span class="meta">{{WORD_COUNT}} 字</span>
        </div>
        <button class="copy-btn" onclick="copyToWechat()">复制到公众号</button>
    </div>
</div>

<div class="shell">
    <div class="control-row">
        <div class="control-card">
            <span class="fs-label">字号</span>
            <button class="fs-btn active" data-size="15" onclick="switchFontSize(15)">15px</button>
            <button class="fs-btn" data-size="16" onclick="switchFontSize(16)">16px</button>
            <button class="fs-btn" data-size="17" onclick="switchFontSize(17)">17px</button>
        </div>
    </div>

    <div class="preview-card">
        <div class="preview-head">
            <div class="device">
                <span class="device-dot"></span>
                <span class="device-dot"></span>
                <span class="device-dot"></span>
                <span>公众号预览</span>
            </div>
            <span class="meta">{{TITLE}}</span>
        </div>
        <div class="article-content" id="articleContent">
{{ARTICLE_HTML}}
        </div>
    </div>
</div>

<div id="wechatHtml">
{{ARTICLE_HTML}}
</div>

<script>
function applyFontSizeToContainer(container, size) {
    if (!container) return;
    container.querySelectorAll('p, span, section').forEach(function(el) {
        var currentSize = parseInt(window.getComputedStyle(el).fontSize, 10);
        if (currentSize >= 14 && currentSize <= 17) {
            el.style.fontSize = size + 'px';
            if (el.tagName === 'P') {
                el.style.lineHeight = size === 17 ? '1.72' : (size === 16 ? '1.75' : '1.8');
            }
        }
    });
}

function switchFontSize(size) {
    document.querySelectorAll('.fs-btn').forEach(function(btn) {
        if (parseInt(btn.dataset.size, 10) === size) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
    applyFontSizeToContainer(document.getElementById('articleContent'), size);
    applyFontSizeToContainer(document.getElementById('wechatHtml'), size);
    localStorage.setItem('wechat-format-fontsize', size);
}

document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('wechat-format-fontsize');
    if (saved && saved !== '15') {
        switchFontSize(parseInt(saved, 10));
    }
});

function copyToWechat() {
    var source = document.getElementById('wechatHtml');
    var range = document.createRange();
    range.selectNodeContents(source);

    source.style.position = 'fixed';
    source.style.left = '0';
    source.style.top = '0';
    source.style.opacity = '0.01';
    source.style.width = '375px';

    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);

    try {
        document.execCommand('copy');
        showCopied();
    } catch (e) {
        var html = source.innerHTML;
        var blob = new Blob([html], { type: 'text/html' });
        var item = new ClipboardItem({ 'text/html': blob });
        navigator.clipboard.write([item]).then(showCopied).catch(function() {
            alert('复制失败，请手动选中文章内容复制');
        });
    }

    sel.removeAllRanges();
    source.style.position = 'absolute';
    source.style.left = '-9999px';
    source.style.top = '-9999px';
}

function showCopied() {
    var btn = document.querySelector('.copy-btn');
    btn.textContent = '已复制到剪贴板';
    btn.classList.add('copied');
    setTimeout(function() {
        btn.textContent = '复制到公众号';
        btn.classList.remove('copied');
    }, 2500);
}
</script>
</body>
</html>
